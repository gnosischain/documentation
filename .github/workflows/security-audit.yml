name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run security audit
        # `yarn audit` (Yarn Classic) returns a severity bitmask as its exit code:
        # 1=info, 2=low, 4=moderate, 8=high, 16=critical. The `--level` flag only
        # filters the printed table, NOT the exit code, so the step would otherwise
        # fail on any low/moderate finding. Gate the pass/fail on the high+critical bits only.
        run: |
          yarn audit --level high || EXIT=$?
          if [ $(( ${EXIT:-0} & 8 )) -ne 0 ] || [ $(( ${EXIT:-0} & 16 )) -ne 0 ]; then
            echo "::error::High or critical severity vulnerabilities found in dependencies"
            exit 1
          fi
          echo "No high or critical severity vulnerabilities found"